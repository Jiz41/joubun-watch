  <p class="source">出典：e-Gov法令検索（<a href="https://laws.e-gov.go.jp/" target="_blank" rel="noopener noreferrer">https://laws.e-gov.go.jp/</a>）</p>

<script>
(function () {
  "use strict";

  var LAW_IDS = [
    "129AC0000000089", "322AC0000000049", "331AC0000000120",
    "360AC0000000088", "412AC0000000061", "415AC0000000057",
    "417AC0000000086"
  ];
  var NEW_DAYS = 3;
  var NEW_LIMIT = 10;

  function escapeHtml(s) {
    return String(s)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }

  function formatArticle(num) {
    return "第" + num + "条";
  }

  function formatDate(iso) {
    var m = /^(\d{4})-(\d{2})-(\d{2})$/.exec(iso || "");
    if (!m) { return iso || ""; }
    return Number(m[1]) + "年" + Number(m[2]) + "月" + Number(m[3]) + "日";
  }

  function parseDate(iso) {
    var m = /^(\d{4})-(\d{2})-(\d{2})$/.exec(iso || "");
    if (!m) { return null; }
    return new Date(Number(m[1]), Number(m[2]) - 1, Number(m[3]));
  }

  function isNew(iso) {
    var d = parseDate(iso);
    if (!d) { return false; }
    var now = new Date();
    var today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    var diff = Math.round((today - d) / 86400000);
    return Math.abs(diff) <= NEW_DAYS;
  }

  // 先頭・末尾の共通部分を除いた中央だけを <mark> で囲む簡易差分。
  function diffHtml(oldText, newText) {
    var o = oldText || "";
    var n = newText || "";
    if (o === "" || n === "") {
      return { old: escapeHtml(o), neu: escapeHtml(n) };
    }
    var p = 0;
    var maxP = Math.min(o.length, n.length);
    while (p < maxP && o.charAt(p) === n.charAt(p)) { p++; }
    var s = 0;
    var maxS = Math.min(o.length - p, n.length - p);
    while (s < maxS && o.charAt(o.length - 1 - s) === n.charAt(n.length - 1 - s)) { s++; }
    var oMid = o.slice(p, o.length - s);
    var nMid = n.slice(p, n.length - s);
    var pre = escapeHtml(o.slice(0, p));
    var suf = escapeHtml(o.slice(o.length - s));
    var oHtml = pre + (oMid ? "<mark>" + escapeHtml(oMid) + "</mark>" : "") + suf;
    var nHtml = pre + (nMid ? "<mark>" + escapeHtml(nMid) + "</mark>" : "") + suf;
    return { old: oHtml, neu: nHtml };
  }

  function tagList(tags) {
    var out = [];
    if (tags && Array.isArray(tags.industry)) { out = out.concat(tags.industry); }
    if (tags && Array.isArray(tags.stance)) { out = out.concat(tags.stance); }
    return out;
  }

  function renderEntry(c) {
    var classified = !!c.severity;
    var article = formatArticle(c.article_num);
    var newBadge = isNew(c.enforcement_date)
      ? '<span class="new-badge">NEW</span>' : "";

    var isRenumbered = (c.change_type === "renumbered"
      || c.change_type === "renumbered_and_changed");
    var moveBadge = (isRenumbered && c.old_article_num)
      ? '<span class="move-badge">番号変更 第' + escapeHtml(c.old_article_num)
        + "条→第" + escapeHtml(c.article_num) + "条</span>"
      : "";

    var sevHtml = classified
      ? '<span class="severity" data-level="' + escapeHtml(c.severity) + '">'
        + escapeHtml(c.severity) + "</span>"
      : '<span class="tag tag-unclassified">未分類</span>';

    var tags = classified ? tagList(c.tags) : [];
    var tagsHtml = tags.map(function (t) {
      return '<span class="tag">' + escapeHtml(t) + "</span>";
    }).join("");

    var heading = c.heading || "本則条文の改正を検知";
    var lede = c.note || "条文本文に変更が検出されました。";

    var d = diffHtml(c.old_text, c.new_text);
    var lines = "";
    if (c.old_text) {
      lines += '<div class="diff-line removed"><span class="marker">−</span><span>'
        + d.old + "</span></div>";
    }
    if (c.new_text) {
      lines += '<div class="diff-line added"><span class="marker">+</span><span>'
        + d.neu + "</span></div>";
    }

    var unclassifiedNote = classified ? "" :
      '<div class="unclassified-note">この条文はまだ影響タグが割り当てられていません。</div>';

    var egovUrl = "https://laws.e-gov.go.jp/law/" + encodeURIComponent(c.law_id);
    var reportUrl = "report.html?law=" + encodeURIComponent(c.law_title || "")
      + "&article=" + encodeURIComponent(article || "");
    var egovLink = c.law_id
      ? '<div class="entry-source">'
        + '<a class="egov-link" href="' + escapeHtml(egovUrl) + '"'
        + ' target="_blank" rel="noopener noreferrer">e-Govで原文を見る</a>'
        + '<a class="report-link" href="' + escapeHtml(reportUrl) + '">タグが違うと思ったら報告</a>'
        + "</div>"
      : "";

    return '<article class="entry">'
      + '<div class="entry-eyebrow">'
      + '<span class="law-name">' + escapeHtml(c.law_title) + "</span>"
      + '<span class="article-no">' + escapeHtml(article) + "</span>"
      + '<span class="enforce-date">' + escapeHtml(formatDate(c.enforcement_date)) + " 施行</span>"
      + newBadge
      + moveBadge
      + "</div>"
      + '<h2 class="headline">' + escapeHtml(heading) + "</h2>"
      + '<div class="tag-row">' + sevHtml + tagsHtml + "</div>"
      + '<p class="lede">' + escapeHtml(lede) + "</p>"
      + '<details class="expand"><summary class="expand-toggle">条文の変化を見る</summary>'
      + '<div class="diff-block"><div class="diff-caption">旧 → 新（差分表示）</div>'
      + '<div class="diff-lines">' + lines + "</div></div>"
      + unclassifiedNote
      + "</details>"
      + egovLink
      + "</article>";
  }

  function sortByDateDesc(a, b) {
    if (a.enforcement_date < b.enforcement_date) { return 1; }
    if (a.enforcement_date > b.enforcement_date) { return -1; }
    return 0;
  }

  function fillList(elId, entries, emptyMsg) {
    var el = document.getElementById(elId);
    if (!el) { return; }
    if (!entries.length) {
      el.innerHTML = '<p class="empty-note">' + escapeHtml(emptyMsg) + "</p>";
      return;
    }
    el.innerHTML = entries.map(renderEntry).join("");
  }

  function render(changes) {
    var all = changes.slice().sort(sortByDateDesc);

    fillList("list-new", all.slice(0, NEW_LIMIT), "直近の改正はありません。");

    LAW_IDS.forEach(function (id) {
      var rows = all.filter(function (c) { return c.law_id === id; });
      fillList("list-" + id, rows, "直近の改正はありません。");
    });
  }

  function showError(msg) {
    var el = document.getElementById("list-new");
    if (el) {
      el.innerHTML = '<p class="empty-note">' + escapeHtml(msg) + "</p>";
    }
  }

  fetch("data/feed.json", { cache: "no-store" })
    .then(function (r) {
      if (!r.ok) { throw new Error("HTTP " + r.status); }
      return r.json();
    })
    .then(function (data) { render(data.changes || []); })
    .catch(function (e) {
      showError("データの読み込みに失敗しました（" + e.message + "）。");
    });
})();
</script>
